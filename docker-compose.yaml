services:
  db:
    image: postgres:16-alpine
    container_name: go_test_db
    env_file:
      - .env
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - go-test-network

  redis:
    image: redis:7
    container_name: core_redis_container_dev
    restart: on-failure
    ports:
      - '6379:6379'
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_dev:/data
    networks:
      - go-test-network

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: go_test_app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - go-test-network

  migrate:
    image: migrate/migrate:4
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    env_file:
      - .env
    entrypoint: [ "migrate", "-path", "/migrations", "-database", "${DATABASE_MIGRATION_URL}" ]
    networks:
      - go-test-network

  nginx:
    image: nginx:stable-alpine
    container_name: go_test_nginx
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - go-test-network

volumes:
  db_data_dev:
  redis_data_dev:

networks:
  go-test-network:
    driver: bridge
